<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Neon Clicker · симулятор монет</title>
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0b0d1e, #020617);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .game-container {
            max-width: 700px;
            width: 100%;
            background: rgba(10, 14, 30, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 25px 40px -10px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.1);
            border-radius: 48px;
            padding: 32px 28px;
            transition: all 0.3s ease;
        }

        /* Заголовок */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a5f0ff, #6b8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            text-shadow: 0 0 10px #00ffff80;
        }

        .header p {
            color: #9bbdff;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* Монетный счётчик */
        .coin-display {
            background: rgba(0, 20, 40, 0.6);
            border: 2px solid #00ffff;
            border-radius: 100px;
            padding: 18px 30px;
            margin: 20px 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 0 25px #00ffff, inset 0 0 15px #00ffff40;
            backdrop-filter: blur(4px);
        }

        .coin-icon {
            font-size: 3rem;
            color: #ffe600;
            filter: drop-shadow(0 0 10px #ffd900);
        }

        .coin-amount {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(180deg, #fff8e7, #ffd966);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .coin-label {
            color: #b0f0ff;
            font-size: 1.2rem;
            font-weight: 400;
        }

        /* Кнопка клика */
        .click-area {
            display: flex;
            justify-content: center;
            margin: 30px 0 40px;
        }

        .click-btn {
            background: radial-gradient(circle at 30% 20%, #ffe170, #f0a500);
            border: none;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e1a00;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 10px 0 #b36b00, 0 20px 40px #ffae00, 0 0 50px #ffbb00;
            cursor: pointer;
            transition: all 0.08s linear;
            border: 3px solid #fff9cf;
        }

        .click-btn:active {
            transform: translateY(8px);
            box-shadow: 0 5px 0 #b36b00, 0 20px 40px #ffae00, 0 0 60px #ffdd55;
        }

        .click-btn i {
            font-size: 3rem;
            filter: drop-shadow(0 4px 2px #00000040);
        }

        .click-btn span {
            background: #00000060;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 1.2rem;
            color: white;
            backdrop-filter: blur(4px);
        }

        /* статистика */
        .stats {
            display: flex;
            justify-content: space-between;
            background: #030b1a80;
            border-radius: 60px;
            padding: 16px 20px;
            margin: 20px 0 30px;
            border: 1px solid cyan;
            box-shadow: inset 0 0 15px #00ffff20, 0 5px 10px #00000060;
        }

        .stat-item {
            text-align: center;
            color: white;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #b5fcff;
            text-shadow: 0 0 10px cyan;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* карточки прокачки */
        .upgrades {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 25px 0 15px;
        }

        .upgrade-card {
            background: #0a1229e0;
            border: 2px solid #3d5a80;
            border-radius: 40px;
            padding: 22px 12px;
            text-align: center;
            backdrop-filter: blur(8px);
            transition: 0.2s;
            box-shadow: 0 8px 0 #0f1a2f, 0 0 15px #2f6f9f;
        }

        .upgrade-card:hover {
            border-color: #6ee7ff;
            box-shadow: 0 8px 0 #0f1a2f, 0 0 30px #00ddff;
        }

        .upgrade-icon {
            font-size: 2.5rem;
            color: #ffd966;
            filter: drop-shadow(0 0 8px gold);
        }

        .upgrade-title {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #acd7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 8px 0 4px;
        }

        .upgrade-level {
            background: #0a192f;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
            color: #9cc9ff;
            border: 1px solid cyan;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .upgrade-desc {
            color: #cdedff;
            font-size: 1rem;
            margin: 10px 0;
        }

        .upgrade-desc i {
            color: #ffd966;
        }

        .upgrade-cost {
            background: #000b1c;
            border-radius: 60px;
            padding: 10px 12px;
            font-weight: 700;
            font-size: 1.3rem;
            color: #ffd966;
            border: 1px solid #ffffb0;
            margin: 12px 0 8px;
        }

        .buy-btn {
            background: linear-gradient(145deg, #1f3a5f, #0b1a2f);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 12px 0;
            width: 100%;
            border-radius: 60px;
            box-shadow: 0 6px 0 #0f1a2f, 0 0 15px #2f6f9f;
            cursor: pointer;
            transition: 0.1s linear;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .buy-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f1a2f, 0 0 25px cyan;
        }

        .buy-btn:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: 0 4px 0 #0f1a2f;
            cursor: not-allowed;
        }

        .reset-btn {
            background: transparent;
            border: 2px solid #ff5e7c;
            color: #ffb0c0;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 10px #ff5e7c60;
        }

        .reset-btn:hover {
            background: #ff3b5c30;
            border-color: #ff99aa;
            color: white;
        }

        footer {
            color: #5982b0;
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        @media (max-width: 500px) {
            .game-container { padding: 20px; }
            .coin-amount { font-size: 3rem; }
            .click-btn { width: 150px; height: 150px; font-size: 2rem; }
            .upgrades { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>💰 NEON CLICKER</h1>
            <p>каждая секунда = монетка</p>
        </div>

        <!-- счётчик -->
        <div class="coin-display">
            <i class="fas fa-coins coin-icon"></i>
            <span class="coin-amount" id="coinCounter">0</span>
            <span class="coin-label">монет</span>
        </div>

        <!-- Кнопка клика -->
        <div class="click-area">
            <button class="click-btn" id="clickButton">
                <i class="fas fa-hand-pointer"></i>
                <span id="clickPower">+1</span>
            </button>
        </div>

        <!-- текущий доход -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="cpsDisplay">1</div>
                <div class="stat-label">В СЕКУНДУ</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="cpcDisplay">1</div>
                <div class="stat-label">ЗА КЛИК</div>
            </div>
        </div>

        <!-- прокачка -->
        <div class="upgrades">
            <!-- апгрейд дохода в секунду -->
            <div class="upgrade-card">
                <i class="fas fa-clock upgrade-icon"></i>
                <div class="upgrade-title">Доход в сек</div>
                <div class="upgrade-level" id="cpsLevel">Ур. 0</div>
                <div class="upgrade-desc">
                    <i class="fas fa-arrow-up"></i> +1 мон/сек
                </div>
                <div class="upgrade-cost" id="cpsCost">10</div>
                <button class="buy-btn" id="buyCpsBtn">
                    <i class="fas fa-rocket"></i> улучшить
                </button>
            </div>
            <!-- апгрейд дохода за клик -->
            <div class="upgrade-card">
                <i class="fas fa-hand-fist upgrade-icon"></i>
                <div class="upgrade-title">Клик-доход</div>
                <div class="upgrade-level" id="cpcLevel">Ур. 0</div>
                <div class="upgrade-desc">
                    <i class="fas fa-arrow-up"></i> +1 за клик
                </div>
                <div class="upgrade-cost" id="cpcCost">10</div>
                <button class="buy-btn" id="buyCpcBtn">
                    <i class="fas fa-rocket"></i> улучшить
                </button>
            </div>
        </div>

        <!-- сброс прогресса -->
        <button class="reset-btn" id="resetBtn"><i class="fas fa-trash-alt"></i> сбросить прогресс</button>
        <footer>⚡ каждую секунду +<span id="cpsHint">1</span> монет ⚡</footer>
    </div>

    <script>
        (function() {
            // --- состояние приложения ---
            let coins = 0;
            let cpsLevel = 0;      // количество улучшений дохода в секунду
            let cpcLevel = 0;      // количество улучшений дохода за клик

            // базовые значения (уровень 0 даёт 1 ед.)
            const BASE_CPS = 1;
            const BASE_CPC = 1;

            // константы для расчёта стоимости (base + level * increment)
            const COST_BASE = 10;
            const COST_INCREMENT = 5;

            // DOM элементы
            const coinCounter = document.getElementById('coinCounter');
            const cpsDisplay = document.getElementById('cpsDisplay');
            const cpcDisplay = document.getElementById('cpcDisplay');
            const clickPowerSpan = document.getElementById('clickPower');
            const cpsLevelSpan = document.getElementById('cpsLevel');
            const cpcLevelSpan = document.getElementById('cpcLevel');
            const cpsCostSpan = document.getElementById('cpsCost');
            const cpcCostSpan = document.getElementById('cpcCost');
            const cpsHint = document.getElementById('cpsHint');
            const clickButton = document.getElementById('clickButton');
            const buyCpsBtn = document.getElementById('buyCpsBtn');
            const buyCpcBtn = document.getElementById('buyCpcBtn');
            const resetBtn = document.getElementById('resetBtn');

            // --- вспомогательные функции ---
            function getCps() {
                return BASE_CPS + cpsLevel;
            }

            function getCpc() {
                return BASE_CPC + cpcLevel;
            }

            function getCpsCost() {
                return COST_BASE + cpsLevel * COST_INCREMENT;
            }

            function getCpcCost() {
                return COST_BASE + cpcLevel * COST_INCREMENT;
            }

            // обновление всего интерфейса
            function updateUI() {
                // монеты
                coinCounter.textContent = Math.floor(coins).toLocaleString();

                // показатели
                const cps = getCps();
                const cpc = getCpc();
                cpsDisplay.textContent = cps;
                cpcDisplay.textContent = cpc;
                clickPowerSpan.textContent = `+${cpc}`;
                cpsHint.textContent = cps;

                // уровни
                cpsLevelSpan.textContent = `Ур. ${cpsLevel}`;
                cpcLevelSpan.textContent = `Ур. ${cpcLevel}`;

                // стоимости
                cpsCostSpan.textContent = getCpsCost();
                cpcCostSpan.textContent = getCpcCost();

                // состояние кнопок (достаточно ли монет)
                buyCpsBtn.disabled = coins < getCpsCost();
                buyCpcBtn.disabled = coins < getCpcCost();
            }

            // --- сохранение / загрузка (localStorage) ---
            function saveGame() {
                const gameState = {
                    coins,
                    cpsLevel,
                    cpcLevel
                };
                localStorage.setItem('neonClickerSave', JSON.stringify(gameState));
            }

            function loadGame() {
                const saved = localStorage.getItem('neonClickerSave');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        coins = data.coins ?? 0;
                        cpsLevel = data.cpsLevel ?? 0;
                        cpcLevel = data.cpcLevel ?? 0;
                    } catch (e) {
                        console.warn('Ошибка загрузки');
                    }
                }
                updateUI();
            }

            // сброс
            function resetGame() {
                if (confirm('Сбросить весь прогресс?')) {
                    coins = 0;
                    cpsLevel = 0;
                    cpcLevel = 0;
                    updateUI();
                    saveGame();
                }
            }

            // --- механики ---
            function handleClick() {
                coins += getCpc();
                updateUI();
                saveGame();
                // маленькая вибрация (если поддерживается)
                if (navigator.vibrate) navigator.vibrate(20);
            }

            function buyCps() {
                const cost = getCpsCost();
                if (coins < cost) return;
                coins -= cost;
                cpsLevel++;
                updateUI();
                saveGame();
            }

            function buyCpc() {
                const cost = getCpcCost();
                if (coins < cost) return;
                coins -= cost;
                cpcLevel++;
                updateUI();
                saveGame();
            }

            // --- пассивный доход (каждую секунду) ---
            function passiveEarn() {
                coins += getCps();
                updateUI();
                saveGame();
            }

            // --- инициализация событий ---
            clickButton.addEventListener('click', handleClick);
            buyCpsBtn.addEventListener('click', buyCps);
            buyCpcBtn.addEventListener('click', buyCpc);
            resetBtn.addEventListener('click', resetGame);

            // загружаем сохранение
            loadGame();

            // запускаем интервал (1 сек)
            setInterval(passiveEarn, 1000);

            // дополнительная защита: обновлять кнопки при каждом изменении монет (уже есть в updateUI)
            // также можно добавить автофокус на кнопке, но не обязательно

            // служебное: при ручном сохранении (внешние вкладки) – ничего не делаем
            window.addEventListener('beforeunload', function() {
                saveGame(); // на всякий случай дубль
            });

            // красивое дополнение: при каждом клике вспышка на монете
            coinCounter.addEventListener('animationend', () => {
                coinCounter.style.animation = '';
            });
            // можно лёгкую анимацию при изменении монет
            const originalUpdate = updateUI;
            updateUI = function() {
                const oldCoins = coinCounter.textContent;
                originalUpdate();
                if (coinCounter.textContent !== oldCoins) {
                    coinCounter.style.animation = 'pop 0.1s ease';
                }
            };
            // добавим ключевые кадры для pop
            const styleSheet = document.createElement("style");
            styleSheet.textContent = `
                @keyframes pop {
                    0% { transform: scale(1); }
                    50% { transform: scale(1.1); text-shadow: 0 0 30px gold; }
                    100% { transform: scale(1); }
                }
            `;
            document.head.appendChild(styleSheet);
            updateUI(); // переопределили, вызываем ещё раз для актуальности

            // переопределим handleClick для вызова нашей updateUI (уже ок)
        })();
    </script>
</body>
          </html>
