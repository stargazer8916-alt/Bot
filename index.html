<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Проверка безопасности</title>
    <!-- подключение telegram sdk -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f111a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            user-select: none;
        }

        .card {
            background: #161925;
            border: 1px solid #00f0ff;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
            max-width: 340px;
            width: 100%;
        }

        h1 {
            font-size: 20px;
            margin: 0 0 8px 0;
            color: #00f0ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            font-size: 14px;
            color: #8f9cae;
            margin: 0 0 24px 0;
            line-height: 1.4;
        }

        .math-box {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .input-field {
            width: 100%;
            padding: 14px;
            background: #0f111a;
            border: 1px solid #2a2f45;
            border-radius: 8px;
            color: #ffffff;
            font-size: 18px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #00f0ff;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #00f0ff;
            border: none;
            border-radius: 8px;
            color: #0f111a;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .error-msg {
            color: #ff4a4a;
            font-size: 14px;
            margin-top: 12px;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Проверка защиты</h1>
        <p>Чтобы подписаться на канал, подтвердите, что вы не бот. Решите математический пример:</p>
        
        <div class="math-box" id="question">0 + 0 = ?</div>
        
        <input type="number" id="answer" class="input-field" placeholder="Введите ответ" autocomplete="off">
        <button class="btn" id="submit-btn">Подтвердить</button>
        
        <div class="error-msg" id="error"></div>
    </div>

    <script>
        // инициализация telegram webapp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // получение параметров из url
        const urlParams = new URLSearchParams(window.location.search);
        const queryId = urlParams.get('query_id');
        const chatId = urlParams.get('chat_id');
        const userId = urlParams.get('user_id');

        // генерация примера
        const num1 = Math.floor(Math.random() * 15) + 5;
        const num2 = Math.floor(Math.random() * 15) + 2;
        const correctAnswer = num1 + num2;

        document.getElementById('question').innerText = `${num1} + ${num2} = ?`;

        // обработка отправки
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const userAnswer = parseInt(document.getElementById('answer').value);
            const errorElement = document.getElementById('error');

            if (isNaN(userAnswer)) {
                errorElement.innerText = 'Введите числовой ответ';
                return;
            }

            if (userAnswer !== correctAnswer) {
                errorElement.innerText = 'Неверно, попробуйте еще раз';
                return;
            }

            errorElement.innerText = '';
            errorElement.style.color = '#00ff66';
            errorElement.innerText = 'Успешно! Проверка пройдена.';

            // отправка данных на ваш бэкенд
            try {
                const response = await fetch('/api/verify-captcha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query_id: queryId,
                        chat_id: chatId,
                        user_id: userId,
                        initData: tg.initData
                    })
                });

                if (response.ok) {
                    // закрытие миниаппа при успехе
                    setTimeout(() => tg.close(), 1000);
                } else {
                    errorElement.style.color = '#ff4a4a';
                    errorElement.innerText = 'Ошибка сервера при верификации';
                }
            } catch (err) {
                errorElement.style.color = '#ff4a4a';
                errorElement.innerText = 'Ошибка сети';
            }
        });
    </script>
</body>
</html>
