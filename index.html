<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Розыгрыш</title>
    <!-- Подключаем официальный скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0b0f;
            --accent-glow: rgba(0, 242, 254, 0.5);
            --text-color: #ffffff;
            --text-secondary: #707080;
            --success-color: #00ff88;
            --error-color: #ff3366;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        .scene {
            width: 120px;
            height: 120px;
            margin: 40px auto;
            perspective: 600px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(25deg);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cube.spinning {
            animation: spin 1.5s infinite linear;
        }

        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid #00f2fe;
            background: rgba(0, 242, 254, 0.03);
            box-shadow: 0 0 15px var(--accent-glow);
            line-height: 100px;
            font-size: 30px;
            font-weight: bold;
            color: rgba(0, 242, 254, 0.8);
            border-radius: 8px;
        }

        .face-front  { transform: rotateY(  0deg) translateZ(50px); }
        .face-back   { transform: rotateY(180deg) translateZ(50px); }
        .face-right  { transform: rotateY( 90deg) translateZ(50px); }
        .face-left   { transform: rotateY(-90deg) translateZ(50px); }
        .face-top    { transform: rotateX( 90deg) translateZ(50px); }
        .face-bottom { transform: rotateX(-90deg) translateZ(50px); }

        @keyframes spin {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        .status-box {
            margin-top: 30px;
            min-height: 120px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .status-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        .title {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .error-title { color: var(--error-color); }
        .success-title { color: var(--success-color); }

        .link-btn {
            display: inline-block;
            margin-top: 18px;
            color: #00f2fe;
            text-decoration: none;
            font-size: 14px;
            padding: 10px 24px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 20px;
            background: rgba(0, 242, 254, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .link-btn:active {
            background: rgba(0, 242, 254, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="scene">
            <div class="cube spinning" id="cube">
                <div class="cube-face face-front">🎁</div>
                <div class="cube-face face-back">🎲</div>
                <div class="cube-face face-right">💎</div>
                <div class="cube-face face-left">✨</div>
                <div class="cube-face face-top">🔥</div>
                <div class="cube-face face-bottom">⚡</div>
            </div>
        </div>

        <div class="status-box" id="statusBox">
            <div id="statusContent"></div>
        </div>
    </div>

    <script>
        // === ВАЖНО: ЗАМЕНИ НА СВОЙ URL ВЕБ-СЕРВЕРА (например, https://твой-домен.ру) ===
        const BACKEND_URL = 'http://localhost:3000'; 

        const tg = window.Telegram?.WebApp;
        const cube = document.getElementById('cube');
        const statusBox = document.getElementById('statusBox');
        const statusContent = document.getElementById('statusContent');

        let cachedRefLink = '';

        // Автоматический старт при открытии Mini App
        window.addEventListener('DOMContentLoaded', () => {
            if (tg) {
                tg.ready();
                tg.expand(); // Открываем приложение на весь экран телефона
            }
            runVerification();
        });

        async function runVerification() {
            // Извлекаем параметры юзера и розыгрыша
            const urlParams = new URLSearchParams(window.location.search);
            const giveawayId = urlParams.get('giveaway_id');
            
            // Берем реальные данные из Telegram WebApp SDK
            const user = tg?.initDataUnsafe?.user;
            
            if (!user || !giveawayId) {
                stopCubeAnimate(false, `
                    <div class="title error-title">Ошибка сессии</div>
                    <div style="color: var(--text-secondary);">Откройте приложение через кнопку в Telegram канале.</div>
                `);
                return;
            }

            try {
                // Реальный POST запрос на наш бэкенд
                const response = await fetch(`${BACKEND_URL}/api/check-status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: user.id,
                        username: user.username ? `@${user.username}` : `id${user.id}`,
                        giveawayId: giveawayId
                    })
                });

                const result = await response.json();

                // Имитируем красивое вращение кубика минимум 1.5 секунды для интриги
                setTimeout(() => {
                    if (result.ended) {
                        stopCubeAnimate(false, `
                            <div class="title error-title">Розыгрыш завершен</div>
                            <div style="color: var(--text-secondary);">${result.message}</div>
                        `);
                    } else if (result.subscribed) {
                        cachedRefLink = result.refLink;
                        stopCubeAnimate(true, `
                            <div class="title success-title">Вы участвуете в розыгрыше!</div>
                            <div class="link-btn" onclick="shareRef()">🚀 Увеличить шансы на победу</div>
                        `);
                    } else {
                        stopCubeAnimate(false, `
                            <div class="title error-title">Вы не подписались на все нужные каналы</div>
                            <div style="color: var(--text-secondary); font-size:14px;">Перечитайте условия розыгрыша и попробуйте снова.</div>
                            <a href="${result.postLink}" target="_blank" class="link-btn">🔗 Пост с розыгрышем</a>
                        `);
                    }
                }, 1500);

            } catch (error) {
                stopCubeAnimate(false, `
                    <div class="title error-title">Ошибка связи</div>
                    <div style="color: var(--text-secondary);">Не удалось связаться с сервером бота.</div>
                `);
            }
        }

        function stopCubeAnimate(isSuccess, htmlContent) {
            cube.classList.remove('spinning');
            // Если успех — фиксируем куб красивой лицевой стороной, если нет — боком
            cube.style.transform = isSuccess ? 'rotateX(0deg) rotateY(0deg)' : 'rotateX(20deg) rotateY(-70deg)';
            
            statusContent.innerHTML = htmlContent;
            statusBox.classList.add('show');
        }

        // Функция репоста/копирования реф-ссылки при клике на "Увеличить шансы"
        function shareRef() {
            if (cachedRefLink) {
                // Telegram открывает окно выбора чата для пересылки ссылки
                tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(cachedRefLink)}&text=${encodeURIComponent('Участвуй вместе со мной в крутом розыгрыше! 🔥')}`);
            }
        }
    </script>
</body>
</html>
