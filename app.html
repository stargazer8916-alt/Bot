<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Miner · Пассивный заработок</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #0b1a2e 0%, #1b2f44 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }

        .game-container {
            max-width: 700px;
            width: 100%;
            background: rgba(18, 30, 41, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.15);
        }

        /* Верхний блок с монетами */
        .balance-area {
            background: #0f212f;
            border-radius: 32px;
            padding: 24px 20px;
            margin-bottom: 28px;
            text-align: center;
            box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.6), 0 8px 12px rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid #ffd966;
        }

        .coin-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .coin-icon {
            font-size: 48px;
            filter: drop-shadow(0 4px 4px #00000066);
        }

        .coin-amount {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #f9e281, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px #00000050;
            letter-spacing: 2px;
        }

        .income-info {
            margin-top: 12px;
            font-size: 22px;
            color: #aaccff;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #1d3142;
            padding: 12px 18px;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #3e5e77;
        }

        .income-info span {
            color: #ffd966;
            font-weight: 700;
            font-size: 28px;
            margin-left: 6px;
        }

        /* Прогресс‑бар до следующего дохода */
        .progress-section {
            margin: 20px 0 25px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            color: #b9d9ff;
            font-size: 16px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-bar-bg {
            background: #1d3142;
            height: 22px;
            border-radius: 40px;
            padding: 3px;
            box-shadow: inset 0 2px 4px #00000080;
        }

        .progress-fill {
            background: linear-gradient(90deg, #f6d365, #fda085);
            height: 100%;
            border-radius: 40px;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 12px #ffb347;
        }

        /* Кликер */
        .click-area {
            text-align: center;
            margin: 24px 0;
        }

        .click-button {
            background: radial-gradient(circle at 30% 20%, #ffe484, #d4a017);
            border: none;
            width: 160px;
            height: 160px;
            border-radius: 999px;
            font-size: 28px;
            font-weight: bold;
            color: #281c00;
            cursor: pointer;
            box-shadow: 0 12px 0 #8b5f0c, 0 15px 30px #00000070;
            transition: all 0.07s ease;
            border: 3px solid #fff4b5;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            line-height: 1.2;
        }

        .click-button:active {
            transform: translateY(10px);
            box-shadow: 0 4px 0 #6b4a0a, 0 20px 30px #00000070;
        }

        .click-button small {
            font-size: 18px;
            opacity: 0.9;
        }

        /* Магазин улучшений */
        .upgrades-title {
            font-size: 24px;
            color: #ffdb8e;
            margin: 25px 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px dashed #f6b83e;
            padding-bottom: 8px;
        }

        .upgrades-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .upgrade-card {
            background: #1a3243;
            border-radius: 28px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #446a82;
            box-shadow: 0 6px 0 #0a1a26;
            transition: 0.1s ease;
        }

        .upgrade-card:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0a1a26;
        }

        .upgrade-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .upgrade-name {
            font-size: 22px;
            font-weight: 600;
            color: #fadfad;
        }

        .upgrade-desc {
            font-size: 16px;
            color: #9eb7cc;
        }

        .upgrade-stats {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .upgrade-owned {
            background: #0f212f;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 22px;
            font-weight: 700;
            color: #ffe066;
            border: 1px solid #fd9e28;
            min-width: 70px;
            text-align: center;
        }

        .upgrade-price {
            background: #2d4d66;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 22px;
            font-weight: 700;
            color: #ffdb8e;
            box-shadow: inset 0 -2px 0 #0d2130;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .price-icon {
            font-size: 22px;
        }

        button.buy-btn {
            background: #4c7a9c;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 #1f4057, 0 6px 12px black;
            transition: 0.07s;
            border: 1px solid #9fc8ff;
            letter-spacing: 0.5px;
        }

        button.buy-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #1f4057, 0 6px 12px black;
        }

        button.buy-btn:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: 0 4px 0 #1f4057;
            pointer-events: none;
        }

        .reset-btn {
            margin-top: 32px;
            background: none;
            border: 2px solid #b84a4a;
            color: #ffbebe;
            font-size: 18px;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            width: 100%;
            background: #2a1b1b;
        }

        .reset-btn:hover {
            background: #b84a4a;
            color: white;
        }

        footer {
            color: #628da0;
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
        }
    </style>
</head>
<body>
<div class="game-container" id="game">
    <!-- Баланс -->
    <div class="balance-area">
        <div class="coin-display">
            <span class="coin-icon">🪙</span>
            <span class="coin-amount" id="coinCounter">0</span>
        </div>
        <div class="income-info">
            ⚡ доход/сек <span id="incomePerSec">1</span>
        </div>
    </div>

    <!-- Прогресс до следующей секунды -->
    <div class="progress-section">
        <div class="progress-label">
            <span>🕒 до следующего сбора</span>
            <span id="timerLabel">0.0с</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
    </div>

    <!-- Кликер (активный заработок) -->
    <div class="click-area">
        <button class="click-button" id="clickBtn">
            🪙 <strong>+1</strong>
            <small>клик</small>
        </button>
    </div>

    <!-- Магазин улучшений -->
    <div class="upgrades-title">
        <span>⛏️ ПРОКАЧКА</span>
    </div>
    <div class="upgrades-grid" id="upgradesContainer"></div>

    <!-- Сброс игры (на случай, если захочется начать заново) -->
    <button class="reset-btn" id="resetBtn">↺ Новая игра</button>
    <footer>✨ накопления сохраняются автоматически</footer>
</div>

<script>
    (function() {
        // ------------------- НАСТРОЙКИ --------------------
        // Список улучшений: название, описание, базовая цена, доход в сек за штуку
        const UPGRADES = [
            { name: 'Рабочий', desc: '➕ 1 🪙/сек', basePrice: 10, incomePerUnit: 1, icon: '🔨' },
            { name: 'Шахта', desc: '➕ 5 🪙/сек', basePrice: 60, incomePerUnit: 5, icon: '⛰️' },
            { name: 'Фабрика', desc: '➕ 20 🪙/сек', basePrice: 300, incomePerUnit: 20, icon: '🏭' },
            { name: 'Робот', desc: '➕ 100 🪙/сек', basePrice: 2500, incomePerUnit: 100, icon: '🤖' }
        ];

        // ------------------- СОСТОЯНИЕ --------------------
        let coins = 100;                // начальный капитал для теста (можно поменять, но дадим немного)
        let totalIncomePerSec = 1;       // базовый доход (1 от кликов? нет, базовый пассивный)
        let upgradesOwned = [0, 0, 0, 0]; // количество купленных улучшений

        // Флаг для сохранения при загрузке
        let loaded = false;

        // ------------------- ЭЛЕМЕНТЫ DOM -----------------
        const coinEl = document.getElementById('coinCounter');
        const incomeEl = document.getElementById('incomePerSec');
        const upgradesContainer = document.getElementById('upgradesContainer');
        const clickBtn = document.getElementById('clickBtn');
        const resetBtn = document.getElementById('resetBtn');
        const progressFill = document.getElementById('progressFill');
        const timerLabel = document.getElementById('timerLabel');

        // Для прогресс-бара
        let intervalTime = 1000; // 1 сек
        let lastUpdate = performance.now();
        let animationFrame = null;

        // ------------------- ФУНКЦИИ ОБНОВЛЕНИЯ ИНТЕРФЕЙСА ---------
        function formatNumber(num) {
            return Math.floor(num).toLocaleString();
        }

        function updateUI() {
            coinEl.innerText = formatNumber(coins);
            // Пересчёт дохода
            let inc = 1; // базовый доход (можно сделать 0, но оставим 1 как минимум)
            for (let i = 0; i < upgradesOwned.length; i++) {
                inc += upgradesOwned[i] * UPGRADES[i].incomePerUnit;
            }
            totalIncomePerSec = inc;
            incomeEl.innerText = formatNumber(totalIncomePerSec);

            // Перерисовать карточки улучшений (обновить цены и кнопки)
            renderUpgrades();
        }

        // Функция цены улучшения с учётом купленных (формула: базовая * (1 + кол-во) ^ 1.3 ?)
        // Сделаем прогрессивную цену: basePrice * (owned + 1) * 1.4  (примерно, чтобы не было слишком дёшево)
        function getPrice(index) {
            const base = UPGRADES[index].basePrice;
            const owned = upgradesOwned[index];
            // цена растёт с каждым купленным: base * (owned + 1) * 1.2 (немного прогрессии)
            return Math.floor(base * Math.pow(owned + 1, 1.3));
        }

        // Проверка, хватает ли монет на улучшение
        function canBuy(index) {
            return coins >= getPrice(index);
        }

        // Покупка улучшения
        function buyUpgrade(index) {
            if (!canBuy(index)) return false;

            const price = getPrice(index);
            coins -= price;
            upgradesOwned[index]++;

            updateUI();
            saveGame();
            return true;
        }

        // Отрисовка всех улучшений
        function renderUpgrades() {
            let html = '';
            for (let i = 0; i < UPGRADES.length; i++) {
                const u = UPGRADES[i];
                const owned = upgradesOwned[i];
                const price = getPrice(i);
                const disabled = coins < price ? 'disabled' : '';

                html += `
                    <div class="upgrade-card">
                        <div class="upgrade-info">
                            <span class="upgrade-name">${u.icon} ${u.name}</span>
                            <span class="upgrade-desc">${u.desc}</span>
                        </div>
                        <div class="upgrade-stats">
                            <div class="upgrade-owned">${owned}</div>
                            <div class="upgrade-price"><span class="price-icon">🪙</span>${formatNumber(price)}</div>
                            <button class="buy-btn" data-index="${i}" ${disabled}>Купить</button>
                        </div>
                    </div>
                `;
            }
            upgradesContainer.innerHTML = html;

            // Навесить обработчики на кнопки
            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = e.target.dataset.index;
                    if (index !== undefined) buyUpgrade(parseInt(index));
                });
            });
        }

        // ------------------- ПАССИВНЫЙ ДОХОД --------------------
        let lastPassiveTime = Date.now();

        function passiveIncomeTick() {
            const now = Date.now();
            const diff = (now - lastPassiveTime) / 1000; // в секундах
            if (diff >= 1.0) {
                // сколько целых секунд прошло?
                const seconds = Math.floor(diff);
                coins += totalIncomePerSec * seconds;
                lastPassiveTime += seconds * 1000;

                updateUI();
                saveGame();
            }
            requestAnimationFrame(updateProgress);
        }

        // Плавный прогресс-бар (синхронизирован с реальной секундой)
        function updateProgress() {
            const now = Date.now();
            const elapsed = (now - lastPassiveTime) / 1000; // сколько прошло от начала текущей секунды
            const percent = Math.min(100, (elapsed / 1.0) * 100);
            progressFill.style.width = percent + '%';
            timerLabel.innerText = (elapsed).toFixed(1) + 'с';

            // планируем следующий кадр
            animationFrame = requestAnimationFrame(updateProgress);
        }

        // Запуск интервала пассивного дохода (грубая синхронизация)
        setInterval(() => {
            passiveIncomeTick();
        }, 200); // часто проверяем, чтобы не пропустить секунду

        // ------------------- КЛИКЕР --------------------
        clickBtn.addEventListener('click', () => {
            coins += 1; // базовый клик = 1 монета
            updateUI();
            saveGame();
        });

        // ------------------- СБРОС --------------------
        resetBtn.addEventListener('click', () => {
            if (confirm('Точно начать заново? Вся прогрессия удалится.')) {
                coins = 10;   // немного стартовых
                upgradesOwned = [0, 0, 0, 0];
                totalIncomePerSec = 1;
                lastPassiveTime = Date.now();
                updateUI();
                saveGame();
            }
        });

        // ------------------- LOCALSTORAGE --------------------
        function saveGame() {
            const gameState = {
                coins: coins,
                upgradesOwned: upgradesOwned,
                lastPassiveTime: lastPassiveTime
            };
            localStorage.setItem('idleMinerSave', JSON.stringify(gameState));
        }

        function loadGame() {
            const saved = localStorage.getItem('idleMinerSave');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    coins = data.coins ?? 100;
                    upgradesOwned = data.upgradesOwned ?? [0, 0, 0, 0];
                    // Восстанавливаем время, чтобы не получить гигантский доход после перерыва
                    const savedTime = data.lastPassiveTime;
                    if (savedTime) {
                        const now = Date.now();
                        const diffSeconds = (now - savedTime) / 1000;
                        if (diffSeconds > 0.1) {
                            // начислим доход за пропущенное время (но не более 1 часа, чтобы не сломать)
                            const maxSeconds = Math.min(diffSeconds, 3600);
                            coins += totalIncomePerSec * maxSeconds;
                        }
                        lastPassiveTime = now; // сбросим таймер на сейчас
                    } else {
                        lastPassiveTime = Date.now();
                    }
                } catch (e) {
                    console.warn('Ошибка загрузки', e);
                }
            }
            updateUI();
        }

        // Инициализация: загружаем игру, запускаем рендер
        loadGame();

        // стартуем прогресс
        animationFrame = requestAnimationFrame(updateProgress);

        // дополнительно сохраняем игру при закрытии вкладки (на всякий случай)
        window.addEventListener('beforeunload', () => {
            saveGame();
        });

        // пересчёт прогресс-бара при фокусе (чтобы синхронизировать)
        window.addEventListener('focus', () => {
            // обновим lastPassiveTime, чтобы не начислились лишние монеты, но мы уже начисляем через setInterval.
            // на всякий случай скорректируем:
            const now = Date.now();
            const diff = (now - lastPassiveTime) / 1000;
            if (diff > 1.5) {
                // прошло много времени – начислим доход целыми секундами
                const seconds = Math.floor(diff);
                coins += totalIncomePerSec * seconds;
                lastPassiveTime += seconds * 1000;
                updateUI();
                saveGame();
            }
        });

        // Начальная отрисовка карточек
        renderUpgrades();

        // подстрахуемся — обновляем UI каждую секунду (но данные уже обновляются в пассивном доходе)
        setInterval(() => {
            // просто триггерим пересчёт, если нужно (но updateUI и так вызывается при изменении монет)
        }, 1000);
    })();
</script>
</body>
      </html>
